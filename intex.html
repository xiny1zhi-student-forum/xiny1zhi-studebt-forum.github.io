<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=gb2312" />
<title>信阳第一职业高级中学学生讨论网</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;}
body {background:#f0f2f5;font-family:"宋体", "Microsoft Yahei";}
.header {background:#2c3e50;color:white;padding:30px;text-align:center;}
.header h1 {font-size:26px;margin-bottom:10px;}
.header p {font-size:15px;}
.container {max-width:800px;margin:20px auto;padding:0 15px;}
.card {background:white;padding:20px;margin-bottom:15px;border-radius:8px;box-shadow:0 0 8px #eee;}
.card h2 {color:#3498db;border-bottom:1px solid #ddd;padding-bottom:8px;margin-bottom:15px;font-size:18px;}
.card p {color:#666;font-size:14px;line-height:1.7;}
.input-box {margin-top:15px;}
.input-box input {width:70%;padding:10px;border:1px solid #ddd;border-radius:5px;margin-right:5px;}
.input-box button {padding:10px 20px;background:#3498db;color:white;border:none;border-radius:5px;cursor:pointer;}
.footer {text-align:center;padding:20px;color:#999;font-size:13px;margin-top:20px;}
</style>
</head>
<body>

<div class="header">
<h1>信阳第一职业高级中学学生讨论网</h1>
<p>交流学习 · 分享生活 · 共同成长</p >
</div>

<div class="container">
<div class="card">
<h2>关于本站</h2>
<p>本站是本校计算机专业学生自主搭建的非官方交流平台。专为同学们打造，用于分享学习经验、讨论专业技能、交流校园生活，营造友善、积极的线上交流环境。</p >
</div>

<div class="card">
<h2>学生讨论区</h2>
<p>请文明发言，理性交流，禁止发布违规内容。</p >
<div class="input-box">
<input type="text" placeholder="输入你的想法...">
<button>发布讨论</button>
</div>
</div>
</div>

<div class="footer">
©2026 信阳一职高学生讨论网 版权所有<br>
技术支持：余子龙 信息技术支持：汤关强 技术顾问：张海波
</div>

</body>
</html>
